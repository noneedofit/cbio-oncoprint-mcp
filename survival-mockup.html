<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Survival Analysis Mockup</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #e8ecee;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 48px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.10), 0 0 0 1px rgba(0,0,0,0.04);
      width: 580px;
      overflow: hidden;
    }
    .card-header {
      background: #f2f8f7;
      border-bottom: 1px solid #d8ecea;
      padding: 11px 18px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
    }
    .card-title {
      font-size: 13.5px;
      font-weight: 700;
      color: #1d5450;
      letter-spacing: -0.01em;
    }
    .card-subtitle {
      font-size: 11px;
      color: #7aA09b;
      white-space: nowrap;
    }
    .legend {
      display: flex;
      gap: 20px;
      padding: 8px 18px 0;
      font-size: 11.5px;
      color: #444;
    }
    .legend-item { display: flex; align-items: center; gap: 7px; }
    .legend-line {
      width: 24px;
      height: 2.5px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .card-body {
      padding: 10px 18px 8px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }
    .plot-wrap { flex: 1; }
    canvas { display: block; }
    .stats-panel {
      width: 116px;
      background: #f8f9f9;
      border: 1px solid #eaeaea;
      border-radius: 7px;
      padding: 11px 13px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .stats-panel-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #aaa;
      margin-bottom: 10px;
    }
    .stat-item { margin-bottom: 10px; }
    .stat-label { font-size: 10.5px; color: #888; margin-bottom: 1px; }
    .stat-value { font-size: 14px; font-weight: 700; color: #1d1d1d; }
    .stat-value.highlight { color: #1d5450; }
    .card-footer {
      padding: 8px 18px 16px;
      display: flex;
      gap: 10px;
    }
    .btn {
      font-size: 11.5px;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      letter-spacing: -0.01em;
    }
    .btn-primary {
      background: #1d5450;
      color: #fff;
    }
    .btn-outline {
      background: transparent;
      border: 1.5px solid #009688;
      color: #007d72;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <span class="card-title">Survival Analysis &thinsp;&middot;&thinsp; luad_mskcc_2020</span>
      <span class="card-subtitle">stratified by EGFR mutation status</span>
    </div>

    <div class="legend">
      <div class="legend-item">
        <div class="legend-line" style="background:#c0392b;"></div>
        <span>Altered &thinsp;(n=87)</span>
      </div>
      <div class="legend-item">
        <div class="legend-line" style="background:#009688;"></div>
        <span>Wild-type &thinsp;(n=245)</span>
      </div>
    </div>

    <div class="card-body">
      <div class="plot-wrap">
        <canvas id="km" width="400" height="215"></canvas>
      </div>
      <div class="stats-panel">
        <div class="stats-panel-title">Statistics</div>
        <div class="stat-item">
          <div class="stat-label">Log-rank <em>p</em></div>
          <div class="stat-value highlight">0.0034</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Median (altered)</div>
          <div class="stat-value">42.1 mo</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Median (wt.)</div>
          <div class="stat-value">68.4 mo</div>
        </div>
      </div>
    </div>

    <div class="card-footer">
      <button class="btn btn-primary">View in cBioPortal ↗</button>
      <button class="btn btn-outline">Show Confidence Intervals</button>
    </div>
  </div>

  <script>
    // Step-function KM data: [time_months, survival_prob]
    const altered = [
      [0,1.00],[5,0.94],[9,0.87],[13,0.80],[17,0.73],[22,0.65],
      [27,0.57],[32,0.50],[37,0.43],[42,0.37],[47,0.30],
      [53,0.25],[59,0.20],[66,0.16],[74,0.13],[82,0.10]
    ];
    const censorAlt = [11, 25, 39, 55, 70];

    const wildtype = [
      [0,1.00],[6,0.97],[11,0.94],[16,0.91],[21,0.88],[26,0.84],
      [31,0.80],[36,0.76],[42,0.72],[48,0.68],[54,0.63],
      [60,0.58],[66,0.53],[72,0.48],[79,0.43],[86,0.38],[94,0.34]
    ];
    const censorWt = [19, 39, 58, 76, 90];

    const canvas = document.getElementById('km');
    const ctx = canvas.getContext('2d');
    const DPR = window.devicePixelRatio || 1;
    canvas.width  = 400 * DPR;
    canvas.height = 215 * DPR;
    canvas.style.width  = '400px';
    canvas.style.height = '215px';
    ctx.scale(DPR, DPR);

    const W = 400, H = 215;
    const pad = { left: 44, right: 12, top: 10, bottom: 34 };
    const plotW = W - pad.left - pad.right;
    const plotH = H - pad.top - pad.bottom;
    const maxT  = 100;

    function tx(t) { return pad.left + (t / maxT) * plotW; }
    function ty(s) { return pad.top  + (1 - s) * plotH; }

    // Grid lines
    ctx.strokeStyle = '#f0f0f0'; ctx.lineWidth = 0.8;
    for (let s = 0; s <= 1; s += 0.2) {
      ctx.beginPath(); ctx.moveTo(pad.left, ty(s)); ctx.lineTo(pad.left + plotW, ty(s)); ctx.stroke();
    }
    for (let t = 20; t <= 100; t += 20) {
      ctx.beginPath(); ctx.moveTo(tx(t), pad.top); ctx.lineTo(tx(t), pad.top + plotH); ctx.stroke();
    }

    // Axes
    ctx.strokeStyle = '#d0d0d0'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pad.left, pad.top); ctx.lineTo(pad.left, pad.top + plotH); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(pad.left, pad.top + plotH); ctx.lineTo(pad.left + plotW, pad.top + plotH); ctx.stroke();

    // Y labels
    ctx.fillStyle = '#aaa'; ctx.font = '9px -apple-system, sans-serif'; ctx.textAlign = 'right';
    for (let s = 0; s <= 1; s += 0.2) {
      ctx.fillText(s.toFixed(1), pad.left - 5, ty(s) + 3);
    }

    // X labels
    ctx.textAlign = 'center';
    for (let t = 0; t <= 100; t += 20) {
      ctx.fillText(String(t), tx(t), pad.top + plotH + 13);
    }

    // Axis labels
    ctx.fillStyle = '#bbb';
    ctx.font = '10px -apple-system, sans-serif';
    ctx.fillText('Months', pad.left + plotW / 2, H - 2);

    ctx.save();
    ctx.translate(9, pad.top + plotH / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.textAlign = 'center';
    ctx.fillText('Survival probability', 0, 0);
    ctx.restore();

    function drawKM(steps, color) {
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(tx(steps[0][0]), ty(steps[0][1]));
      for (let i = 1; i < steps.length; i++) {
        ctx.lineTo(tx(steps[i][0]), ty(steps[i - 1][1])); // horizontal
        ctx.lineTo(tx(steps[i][0]), ty(steps[i][1]));     // vertical
      }
      ctx.lineTo(tx(maxT), ty(steps[steps.length - 1][1]));
      ctx.stroke();
    }

    function drawCensors(times, steps, color) {
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.2;
      for (const t of times) {
        let s = 1;
        for (const [st, ss] of steps) { if (st <= t) s = ss; }
        const x = tx(t), y = ty(s);
        ctx.beginPath(); ctx.moveTo(x, y - 5); ctx.lineTo(x, y + 5); ctx.stroke();
      }
    }

    drawKM(altered,  '#c0392b');
    drawKM(wildtype, '#009688');
    drawCensors(censorAlt, altered,  '#c0392b88');
    drawCensors(censorWt,  wildtype, '#00968888');
  </script>
</body>
</html>
